[pytest]
# pytest 설정 — mcp-server/python/ 기준
#
# 실행:
#   cd mcp-server/python && py -3.13 -m pytest tests/unit/ -v
# 또는 (프로젝트 루트에서):
#   py -3.13 -m pytest mcp-server/python/tests/unit/ -v
#
# v0.7.9 Phase 10 (post-refactor): Phase 0-9 분할 결과의 회귀 안전망.

testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 일부 모듈은 hwp_core / hwp_editor / hwp_analyzer / pdf_clone / ref_reader 를 import 하므로
# mcp-server/python/ 가 sys.path 에 있어야 함. conftest.py 에서 추가.

# 출력 옵션
addopts =
    -ra
    --strict-markers
    --strict-config
    -p no:cacheprovider
    --color=yes

# 마커 정의
markers =
    pure: pure function tests (no HWP COM, no I/O)
    slow: tests that take > 100ms
